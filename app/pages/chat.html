<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AIチャット - 現場AIナビ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }

    /* Header */
    .chat-header { background: #1a237e; color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .chat-header .back-btn { background: none; border: none; color: #fff; font-size: 1.2em; cursor: pointer; padding: 4px; }
    .chat-header .header-info { flex: 1; }
    .chat-header .header-title { font-weight: 700; font-size: 1em; }
    .chat-header .header-sub { font-size: 0.75em; opacity: 0.8; }
    .eq-select { padding: 6px 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; background: rgba(255,255,255,0.15); color: #fff; font-size: 0.8em; max-width: 160px; }
    .eq-select option { color: #333; }

    /* Messages */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; }

    .msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 0.93em; line-height: 1.65; word-break: break-word; white-space: pre-wrap; }
    .msg-user { align-self: flex-end; background: #1a237e; color: #fff; border-bottom-right-radius: 4px; }
    .msg-ai { align-self: flex-start; background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
    .msg-system { align-self: center; background: #e8eaf6; border-radius: 10px; font-size: 0.82em; color: #333; text-align: center; max-width: 95%; padding: 10px 16px; }

    .msg-time { font-size: 0.65em; opacity: 0.5; margin-top: 4px; }
    .msg-ai .msg-time { text-align: left; }
    .msg-user .msg-time { text-align: right; }

    .sources-badge { font-size: 0.75em; color: #1a237e; margin-top: 6px; cursor: pointer; }
    .sources-detail { font-size: 0.75em; color: #666; margin-top: 2px; display: none; }
    .sources-detail.open { display: block; }

    .faq-badge { display: inline-block; background: #fff3e0; color: #e65100; padding: 1px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 600; margin-bottom: 4px; }

    /* Action buttons after AI message */
    .resolve-bar { display: flex; gap: 8px; padding: 8px 0; align-self: flex-start; }
    .resolve-btn { padding: 10px 18px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.88em; font-weight: 600; min-height: 44px; transition: all 0.15s; }
    .resolve-btn.yes { background: #e8f5e9; color: #2e7d32; }
    .resolve-btn.yes:active { background: #c8e6c9; }
    .resolve-btn.no { background: #fce4ec; color: #c62828; }
    .resolve-btn.no:active { background: #f8bbd0; }

    /* Issue type selector */
    .issue-type-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0; align-self: flex-start; }
    .issue-type-btn { padding: 8px 14px; background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; font-size: 0.82em; cursor: pointer; min-height: 40px; }
    .issue-type-btn:active { background: #e8eaf6; }

    /* Contact card */
    .contact-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px; margin: 4px 0; align-self: flex-start; max-width: 90%; }
    .contact-card .cc-title { font-weight: 700; font-size: 0.85em; color: #1a237e; margin-bottom: 8px; }
    .contact-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .contact-item:last-child { border-bottom: none; }
    .contact-name { font-weight: 600; font-size: 0.9em; }
    .contact-role { font-size: 0.75em; color: #888; }
    .contact-btns { display: flex; gap: 6px; margin-top: 6px; }
    .contact-btns a { display: inline-flex; align-items: center; gap: 4px; padding: 8px 14px; border-radius: 8px; text-decoration: none; font-size: 0.82em; font-weight: 600; min-height: 40px; }
    .contact-btns a.phone { background: #1a237e; color: #fff; }
    .contact-btns a.email { background: #e8eaf6; color: #1a237e; }

    .step-resolve-bar { display: flex; gap: 8px; padding: 8px 0; align-self: flex-start; }

    /* Suggestions */
    .suggestions { flex-shrink: 0; display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto; border-top: 1px solid #e0e0e0; background: #fff; }
    .suggest-btn { padding: 8px 14px; background: #f5f5f5; border: 1px solid #e0e0e0; border-radius: 20px; cursor: pointer; font-size: 0.78em; white-space: nowrap; min-height: 36px; }
    .suggest-btn:active { background: #e8eaf6; }

    /* Input */
    .chat-input-area { flex-shrink: 0; padding: 12px 16px; background: #fff; border-top: 1px solid #e0e0e0; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0)); }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-row textarea { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 20px; resize: none; font-size: 0.95em; font-family: inherit; max-height: 100px; line-height: 1.4; }
    .input-row textarea:focus { outline: none; border-color: #1a237e; }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: #1a237e; color: #fff; border: none; cursor: pointer; font-size: 1.2em; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; }

    /* Thinking animation */
    .thinking { display: inline-flex; gap: 4px; padding: 4px 0; }
    .thinking span { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="chat-header">
    <button class="back-btn" onclick="window.location.href='../index.html'">←</button>
    <div class="header-info">
      <div class="header-title" id="header-title">AIチャット</div>
      <div class="header-sub" id="header-sub">設備を選択して質問できます</div>
    </div>
    <select class="eq-select" id="eq-select" onchange="onEqChange()">
      <option value="">🏭 全設備</option>
    </select>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="msg msg-system">AIアシスタントに質問してください。マニュアル検索・トラブル対応・操作方法を回答します。</div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggest-btn" onclick="quickAsk(this.textContent)">インク交換の手順</button>
    <button class="suggest-btn" onclick="quickAsk(this.textContent)">用紙のセット方法</button>
    <button class="suggest-btn" onclick="quickAsk(this.textContent)">エラーが出た</button>
    <button class="suggest-btn" onclick="quickAsk(this.textContent)">メンテナンス項目</button>
    <button class="suggest-btn" onclick="quickAsk(this.textContent)">点検の手順</button>
  </div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea id="chat-input" rows="1" placeholder="質問を入力..."></textarea>
      <button class="send-btn" id="send-btn" disabled onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const API = 'http://localhost:8001';
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    let currentEqId = '';
    let currentInqId = null;
    let lastQuestion = '';
    let conversationHistory = [];

    // ===== Equipment =====
    async function loadEquipment() {
      try {
        const d = await(await fetch(API + '/equipment')).json();
        const sel = document.getElementById('eq-select');
        (d.equipment || []).forEach(eq => {
          sel.innerHTML += `<option value="${eq.id}" data-name="${eq.name}" data-loc="${eq.location||''}">${eq.name}</option>`;
        });
      } catch {}
      // URL param
      const params = new URLSearchParams(window.location.search);
      const eqParam = params.get('equipment_id');
      if (eqParam) { document.getElementById('eq-select').value = eqParam; onEqChange(); }
    }

    function onEqChange() {
      const sel = document.getElementById('eq-select');
      currentEqId = sel.value;
      const opt = sel.selectedOptions[0];
      if (currentEqId && opt) {
        const name = opt.dataset.name || '';
        document.getElementById('header-title').textContent = name || 'AIチャット';
        document.getElementById('header-sub').textContent = opt.dataset.loc || '';
        addSystemMsg('🏭 ' + name + ' について何でも聞いてください');
      } else {
        document.getElementById('header-title').textContent = 'AIチャット';
        document.getElementById('header-sub').textContent = '設備を選択して質問できます';
      }
    }

    // ===== Input =====
    chatInput.addEventListener('input', () => {
      sendBtn.disabled = !chatInput.value.trim();
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });
    let chatComposing = false;
    chatInput.addEventListener('compositionstart', () => {
      chatComposing = true;
    });
    chatInput.addEventListener('compositionend', () => {
      chatComposing = false;
    });
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        if (chatComposing) return;
        if (e.isComposing) return;
        e.preventDefault();
        sendMessage();
      }
    });

    function quickAsk(text) { chatInput.value = text; sendBtn.disabled = false; sendMessage(); }

    // ===== Messages =====
    function addMsg(text, type, extra) {
      const el = document.createElement('div');
      el.className = 'msg msg-' + type;
      const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      let html = text;
      if (extra?.sources?.length) {
        html += `<div class="sources-badge" onclick="this.nextElementSibling.classList.toggle('open')">📄 出典 (${extra.sources.length}件)</div>`;
        html += `<div class="sources-detail">${extra.sources.join('<br>')}</div>`;
      }
      if (extra?.faq) html = '<span class="faq-badge">📌 よくある質問より</span><br>' + html;
      html += `<div class="msg-time">${time}</div>`;
      el.innerHTML = html;
      chatMessages.appendChild(el);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return el;
    }

    function addSystemMsg(text) { addMsg(text, 'system'); }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML.replace(/\n/g, '<br>'); }

    // ===== Send =====
    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;
      chatInput.value = ''; chatInput.style.height = 'auto'; sendBtn.disabled = true;
      lastQuestion = text;
      document.getElementById('suggestions').style.display = 'none';

      addMsg(escHtml(text), 'user');
      conversationHistory.push({ role: 'user', content: text });

      // Thinking
      const thinkEl = document.createElement('div');
      thinkEl.className = 'msg msg-ai';
      thinkEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
      chatMessages.appendChild(thinkEl);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      try {
        const body = { question: text };
        if (currentEqId) body.equipment_id = currentEqId;
        // 会話文脈を含める（直前のやり取りをcontextとして追加）
        if (conversationHistory.length >= 2) {
          const recent = conversationHistory.slice(-4); // 直近2往復
          const contextStr = recent.map(m => (m.role === 'user' ? '質問: ' : '回答: ') + m.content.substring(0, 200)).join('\n');
          body.question = '【前の会話の文脈】\n' + contextStr + '\n\n【今の質問】\n' + text;
        }

        const res = await fetch(API + '/ask', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body)
        });
        const data = await res.json();
        thinkEl.remove();

        const answerText = data.answer || '回答を取得できませんでした';
        addMsg(escHtml(answerText), 'ai', { sources: data.sources });
        conversationHistory.push({ role: 'assistant', content: answerText });

        // Create inquiry record
        try {
          const inqRes = await fetch(API + '/inquiries', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ question: text, equipment_id: currentEqId, answer: answerText })
          });
          const inqData = await inqRes.json();
          currentInqId = inqData.id;
        } catch {}

        // Show resolve buttons
        showResolveButtons(data);

      } catch (e) {
        thinkEl.remove();
        addMsg('接続エラー: AIサービスに接続できません', 'system');
      }
    }

    // ===== Resolve Flow =====
    function showResolveButtons(apiData) {
      addSystemMsg('この回答で解決しましたか？');
      const bar = document.createElement('div');
      bar.className = 'resolve-bar';
      bar.innerHTML = `
        <button class="resolve-btn yes" onclick="onResolved(this.parentElement)">✅ 解決した</button>
        <button class="resolve-btn no" onclick="onNotResolved(this.parentElement, ${JSON.stringify(apiData).replace(/"/g, '&quot;')})">❌ 解決しない</button>
      `;
      chatMessages.appendChild(bar);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function onResolved(barEl) {
      barEl.remove();
      if (currentInqId) {
        try { await fetch(API + '/inquiries/' + currentInqId + '/resolve-internal', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ resolved_by: 'staff', note: '現場で解決' }) }); } catch {}
      }
      addSystemMsg('✅ 解決済みとして記録しました');
      addSystemMsg('続けて質問できます...');
    }

    function onNotResolved(barEl, apiData) {
      barEl.remove();
      addSystemMsg('この回答で解決しましたか？ → 解決しない');
      // Show issue type selector
      const typeBar = document.createElement('div');
      typeBar.className = 'issue-type-bar';
      ['操作方法', '機械不良', '消耗品切れ', '電気系統', 'ソフトウェア', 'その他'].forEach(t => {
        typeBar.innerHTML += `<button class="issue-type-btn" onclick="onIssueTypeSelected('${t}', this.parentElement)">${t}</button>`;
      });
      chatMessages.appendChild(typeBar);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function onIssueTypeSelected(issueType, barEl) {
      barEl.remove();
      addSystemMsg('障害種別: ' + issueType);

      // Record handover
      if (currentInqId) {
        try { await fetch(API + '/inquiries/' + currentInqId + '/handover', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ issue_type: issueType, step: 'internal' }) }); } catch {}
      }

      // STEP 1: Internal staff
      showStep1(issueType);
    }

    async function showStep1(issueType) {
      const card = document.createElement('div');
      card.className = 'contact-card';
      let html = '<div class="cc-title">【STEP 1】社内保守担当に連絡</div>';

      try {
        const url = currentEqId ? API + '/staff/maintenance?equipment_id=' + currentEqId : API + '/staff/maintenance';
        const staffData = await(await fetch(url)).json();
        if (staffData.staff && staffData.staff.length) {
          staffData.staff.forEach(s => {
            html += `<div class="contact-item">
              <div class="contact-name">👤 ${s.display_name}</div>
              <div class="contact-role">${s.department || ''}</div>
              <div class="contact-btns">
                ${s.phone ? `<a class="phone" href="tel:${s.phone}">📞 電話</a>` : ''}
                ${s.email ? `<a class="email" href="mailto:${s.email}">✉️ メール</a>` : ''}
              </div>
            </div>`;
          });
        } else {
          html += '<div style="color:#999;padding:8px 0">社内保守担当が登録されていません</div>';
        }
      } catch {
        html += '<div style="color:#999;padding:8px 0">取得失敗</div>';
      }

      card.innerHTML = html;
      chatMessages.appendChild(card);

      // Step1 resolve bar
      const bar = document.createElement('div');
      bar.className = 'step-resolve-bar';
      bar.innerHTML = `
        <button class="resolve-btn yes" onclick="onStep1Resolved(this.parentElement)">✅ 社内で解決した</button>
        <button class="resolve-btn no" onclick="onStep1NotResolved(this.parentElement, '${issueType}')">❌ 社内でも解決しない</button>
      `;
      chatMessages.appendChild(bar);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function onStep1Resolved(barEl) {
      barEl.remove();
      if (currentInqId) {
        try { await fetch(API + '/inquiries/' + currentInqId + '/resolve-internal', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ resolved_by: 'internal_staff', note: '社内保守担当で解決' }) }); } catch {}
      }
      addSystemMsg('✅ 社内で解決済みとして記録しました');
    }

    async function onStep1NotResolved(barEl, issueType) {
      barEl.remove();

      // Record escalation
      if (currentInqId) {
        try { await fetch(API + '/inquiries/' + currentInqId + '/handover', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ issue_type: issueType, step: 'external' }) }); } catch {}
      }

      // STEP 2: External company
      const card = document.createElement('div');
      card.className = 'contact-card';
      let html = '<div class="cc-title">【STEP 2】保守会社に連絡</div>';

      try {
        if (currentEqId) {
          const eq = await(await fetch(API + '/equipment/' + currentEqId)).json();
          const cc = eq.company_contacts;
          if (cc && cc.maintenance) {
            const c = cc.maintenance;
            const mc = eq.maintenance_detail?.maintenance_contract || {};

            // mailto
            const subject = encodeURIComponent(`【設備障害】${eq.name || ''} / ${issueType}`);
            const mailBody = encodeURIComponent(
              `設備名：${eq.name || ''}（${eq.code || ''}）\n設置場所：${eq.location || ''}\n障害種別：${issueType}\n質問内容：${lastQuestion}\n発生日時：${new Date().toLocaleString('ja-JP')}`
            );
            const mailTo = c.person_email || c.email || '';

            html += `<div class="contact-item">
              <div class="contact-name">🏢 ${c.company}</div>
              <div style="font-size:0.88em">保守担当: ${c.person || '-'}</div>
              <div style="font-size:0.85em;color:#666">${mc.support_hours ? '🕐 ' + mc.support_hours : ''}</div>
              <div class="contact-btns">
                ${c.phone ? `<a class="phone" href="tel:${c.phone}">📞 電話をかける</a>` : ''}
                ${mailTo ? `<a class="email" href="mailto:${mailTo}?subject=${subject}&body=${mailBody}">✉️ 修理依頼メール</a>` : ''}
              </div>
            </div>`;

            // Next inspection
            const insp = eq.inspection || {};
            if (insp.next_date) {
              const diff = Math.ceil((new Date(insp.next_date) - new Date()) / 864e5);
              html += `<div style="margin-top:8px;font-size:0.82em;color:#e65100">⚠️ 次回点検: ${insp.next_date}${diff <= 30 ? ' (残' + diff + '日)' : ''}</div>`;
            }
          } else {
            html += '<div style="color:#999;padding:8px 0">保守会社が登録されていません</div>';
          }
        }
      } catch {
        html += '<div style="color:#999;padding:8px 0">取得失敗</div>';
      }

      card.innerHTML = html;
      chatMessages.appendChild(card);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      addSystemMsg('📋 外部保守会社へのエスカレートを記録しました');
    }

    // ===== Init =====
    loadEquipment();
  </script>
</body>
</html>
